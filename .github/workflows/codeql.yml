name: "CodeQL"

# TODO: Midlertidig workaround for Kotlin 2.3.20 — CodeQL 2.25.1 støtter ikke 2.3.20,
# og repoet er rent Kotlin, så `build-mode: none` finner ingen Java å analysere.
# Vi lar analyze steget feile mykt med continue on error til 2.25.2.
# Se: https://github.com/github/codeql/issues/21484
# Når 2.25.2 er ute:
# - Fjern continue on error.
# - Sett tilbake `build-mode: manual`, `languages: java-kotlin`.
# - Legg tilbake JDK 21-setup og "Build with Maven" steget.

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    schedule:
        -   cron: '0 6 * * 1'

jobs:
    analyze:
        name: Analyze
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v4

            -   name: Initialize CodeQL
                uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # ratchet:github/codeql-action/init@v3
                with:
                    languages: java
                    build-mode: none

            -   name: Perform CodeQL Analysis
                uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # ratchet:github/codeql-action/analyze@v3
                continue-on-error: true
                with:
                    category: "/language:java"
