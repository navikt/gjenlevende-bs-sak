name: "CodeQL"

# Repoet er rent Kotlin (ingen Java-filer). `build-mode: none` (buildless)
# støtter kun Java, så CodeQL fant ingen kode å analysere. Kotlin må bygges.
# Derfor: `build-mode: manual` + faktisk Maven-bygg, slik som vanlig build.yaml.
#
# CodeQL 2.25.4 støtter offisielt Kotlin opp til 2.3.20, men pom.xml bruker
# 2.3.21. Forskjellen er kun en patch-versjon (kompilator-plugin-API endres
# normalt ikke i patch-utgivelser), så vi setter
# CODEQL_EXTRACTOR_KOTLIN_OVERRIDE_VERSION_CHECK=true for å la extractoren
# kjøre likevel. Kan fjernes når CodeQL offisielt støtter Kotlin 2.3.21+.

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    schedule:
        -   cron: '0 6 * * 1'

jobs:
    analyze:
        name: Analyze
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            packages: read
            security-events: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4

            -   name: Set up JDK 25
                uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v4
                with:
                    distribution: 'temurin'
                    java-version: '25'
                    cache: 'maven'

            -   name: Initialize CodeQL
                uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # ratchet:github/codeql-action/init@v3
                with:
                    languages: java-kotlin
                    build-mode: manual

            -   name: Build with Maven
                env:
                    GITHUB_USERNAME: x-access-token
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    CODEQL_EXTRACTOR_KOTLIN_OVERRIDE_VERSION_CHECK: true
                run: mvn -B --no-transfer-progress test-compile --settings .m2/maven-settings.xml --file pom.xml

            -   name: Perform CodeQL Analysis
                uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # ratchet:github/codeql-action/analyze@v3
                with:
                    category: "/language:java-kotlin"
