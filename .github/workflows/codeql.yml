name: "CodeQL"

# Midlertidig begrenset til Java fordi CodeQL 2.25.1 ikke støtter Kotlin 2.3.20.
# Repoet er rent Kotlin, så `build-mode: none` med `languages: java` gir ingen reell
# analyse — workflowen kjører for å fange opp regresjoner i CodeQL-oppsettet selv.
# Se: https://github.com/github/codeql/issues/21484
#
# Når CodeQL-action får støtte for Kotlin 2.3:
# - Sett tilbake `build-mode: manual`, `languages: java-kotlin`.
# - Legg tilbake JDK 21-setup og "Build with Maven" steget.

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    schedule:
        -   cron: '0 6 * * 1'

jobs:
    analyze:
        name: Analyze
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4

            -   name: Initialize CodeQL
                uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # ratchet:github/codeql-action/init@v3
                with:
                    languages: java
                    build-mode: none

            -   name: Perform CodeQL Analysis
                uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # ratchet:github/codeql-action/analyze@v3
                with:
                    category: "/language:java"
