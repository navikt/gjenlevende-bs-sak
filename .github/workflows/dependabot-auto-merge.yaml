name: Dependabot auto-merge

on: pull_request_target

permissions:
    contents: write
    pull-requests: write

jobs:
    auto-merge:
        name: Aktiver auto-merge for trygge bumps
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            -   name: Hent Dependabot metadata
                id: meta
                uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # ratchet:dependabot/fetch-metadata@v3
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}

            -   name: Aktiver auto merge for minor og patch
                if: steps.meta.outputs.update-type != 'version-update:semver-major'
                env:
                    PR_URL: ${{ github.event.pull_request.html_url }}
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: gh pr merge --auto --squash "$PR_URL"
