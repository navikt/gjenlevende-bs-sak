apiVersion: kafka.nais.io/v1
kind: Topic
metadata:
    name: utbetaling.v1
    namespace: etterlatte
    labels:
        team: etterlatte
spec:
    pool: nav-dev
    config:
        cleanupPolicy: delete
        minimumInSyncReplicas: 2
        partitions: 1
        replication: 3
        retentionBytes: -1
        retentionHours: 720
    acl:
        - team: etterlatte
          application: gjenlevende-bs-sak
          access: readwrite
       # - team: helved
       #   application: utbetaling
       #   access: read
